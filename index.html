<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bananas Heroes</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #4caf50;
            color: white;
            overflow: hidden;
        }

        #menu {
            text-align: center;
            margin: 0;
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            background-image: url('img/mainmenu.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
        }
        /* darken background so menu text stays readable on top */
        #menu::before {
            content: '';
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.36);
            pointer-events: none;
            z-index: 1;
        }
        .menu-inner { position: relative; z-index: 2; }

        #menu h1 {
            font-size: 36px;
        }

        #menu .characters {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .char {
            cursor: pointer;
            font-size: 24px;
            padding: 15px;
            border-radius: 10px;
            background: #ffcc00;
            transition: all 0.2s ease;
            border: 3px solid transparent;
        }
        
        .char:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .char:active {
            transform: scale(0.95);
        }
        
        .char.selected {
            background: #ff9800;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,152,0,0.6);
        }

        #modes {
            margin-top: 20px;
            display: none;
        }

        #modes button {
            cursor: pointer;
            font-size: 24px;
            padding: 15px;
            border-radius: 10px;
            background: #ffcc00;
            transition: all 0.2s ease;
            border: 3px solid transparent;
            margin: 10px;
            color: #000;
        }
        
        #modes button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        #modes button:active {
            transform: scale(0.95);
        }
        
        #modes button.selected {
            background: #ff9800;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,152,0,0.6);
        }

        #game {
            display: none;
            position: relative;
        }

        canvas {
            display: block;
            background-color: #2e7d32;
        }

        #hud {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="menu">
    <div class="menu-inner">
        <h1>🍌 Bananas Heroes 🍺</h1>
        <div class="characters">
            <div class="char" data-char="max">
                Макс
            </div>
            <div class="char" data-char="dron">
                Дрон
            </div>
            <div class="char" data-char="kuzy">
                Кузя
            </div>
        </div>
        <div id="best-scores" style="margin-top:18px; font-size:16px; color:#fff;"></div>
        <div id="modes">
            <button class="mode" data-mode="normal">Обычный режим</button>
            <button class="mode" data-mode="survival">Выживание</button>
            <button class="mode" data-mode="67">Режим 67</button>
            <button class="mode" data-mode="o4ko">Очко</button>
            <button class="mode" data-mode="platforms">🪜 Платформы</button>
        </div>
    </div>
</div>

<div id="game">
    <canvas id="canvas"></canvas>
    <div id="hud"></div>
    <div id="overlay" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; text-align:center; padding:50px; box-sizing:border-box; flex-direction:column; align-items:center; justify-content:center;"></div>
</div>

<script src="js/core/config.js"></script>
<script src="js/core/state.js"></script>
<script src="js/core/assets.js"></script>
<script src="js/core/utils.js"></script>
<script src="js/entities/player.js"></script>
<script src="js/entities/enemy67.js"></script>
<script src="js/entities/bossO4ko.js"></script>
<script src="js/entities/platform.js"></script>
<script src="js/render/lilac.js"></script>
<script src="js/systems/bullets.js"></script>
<script src="js/systems/spawn.js"></script>
<script src="js/systems/update.js"></script>
<script src="js/render/draw.js"></script>
<script src="js/ui/overlays.js"></script>
<script src="js/perf_debug.js"></script>
<script src="js/main.js"></script>
</body>
</html>
